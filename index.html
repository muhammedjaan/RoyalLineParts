<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parts Management System</title>
    <style>
        :root {
            --primary: #007bff;
            --primary-hover: #0056b3;
            --success: #28a745;
            --warning: #ffc107;
            --danger: #dc3545;
            --dark: #343a40;
            --light: #f8f9fa;
            --border: #dee2e6;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f6f9;
            color: #333;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        h1 { margin: 0; font-size: 24px; color: var(--dark); }

        .tabs { display: flex; gap: 10px; }
        .tab-btn {
            padding: 10px 20px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 600;
            transition: all 0.2s ease-in-out;
        }
        .tab-btn:hover { background-color: var(--light); }
        .tab-btn.active {
            background-color: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .tab-content { display: none; }
        .tab-content.active { display: grid; }
        #shop { grid-template-columns: 2fr 1fr; gap: 20px; }

        .card {
            background: white;
            padding: 24px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        .card h2 { 
            margin-top: 0; 
            font-size: 18px; 
            margin-bottom: 20px; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 10px;
            color: var(--dark);
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
        select, input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            background-color: #fff;
            transition: border-color 0.15s ease;
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 15px;
            transition: background-color 0.15s ease;
        }
        .btn:hover { background-color: var(--primary-hover); }
        .btn-success { background-color: var(--success); }
        .btn-success:hover { background-color: #218838; }

        /* Dynamic Item Layouts */
        .row-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border-bottom: 1px solid var(--border);
            background: var(--light);
            margin-bottom: 10px;
            border-radius: 6px;
        }

        .item-details { flex: 1; padding-right: 15px; }
        .item-meta { font-size: 13px; margin-top: 6px; color: #666; }
        .item-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .control-group { display: flex; align-items: center; gap: 4px; }

        .stock-input { width: 90px; padding: 6px 8px; font-size: 14px; }
        .action-btn {
            padding: 6px 12px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }
        
        .btn-price { background-color: #17a2b8; }
        .btn-stock { background-color: var(--dark); }
        .btn-remove { color: var(--danger); cursor: pointer; background: none; border: none; font-weight: bold; font-size: 16px; margin-left: 10px; }

        #cartItems { max-height: 320px; overflow-y: auto; margin-bottom: 15px; }
        .total-box { font-size: 19px; font-weight: 700; text-align: right; margin-bottom: 15px; color: var(--dark); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>OEM Workshop Parts Desk</h1>
        <div class="tabs">
            <button id="btn-shop" class="tab-btn active" data-tab="shop">Sales Terminal</button>
            <button id="btn-inventory" class="tab-btn" data-tab="inventory">Inventory Manager</button>
        </div>
    </header>

    <div id="shop" class="tab-content active">
        <div class="card">
            <h2>Select Vehicle & Components</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;">
                <div class="form-group">
                    <label for="brand">Brand</label>
                    <select id="brand">
                        <option value="Cadillac">Cadillac</option>
                        <option value="Chevrolet">Chevrolet</option>
                        <option value="GMC">GMC</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="model">Model</label>
                    <select id="model"></select>
                </div>
                <div class="form-group">
                    <label for="year">Production Year</label>
                    <select id="year">
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="part">Available Matching Parts</label>
                <select id="part"></select>
            </div>

            <button id="addToCartBtn" class="btn">Add Component to Order</button>
        </div>

        <div class="card">
            <h2>Repair Order Sheet</h2>
            <div id="cartItems"></div>
            <div class="total-box">Total: AED <span id="cartTotal">0</span></div>
            <button id="checkoutBtn" class="btn btn-success">Fulfill & Invoice Order</button>
        </div>
    </div>

    <div id="inventory" class="tab-content">
        <div class="card" style="width: 100%;">
            <h2>Master Inventory Registry Matrix</h2>
            <div class="form-group">
                <input type="text" id="inventorySearch" placeholder="Search by brand, component name, condition status...">
            </div>
            <div id="inventoryList"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
