<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Terminal & Inventory</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background-color: #f4f4f9; color: #333; }
        
        /* Navigation Menu */
        .navbar { background-color: #333; padding: 10px; text-align: center; }
        .navbar button { background-color: #444; color: white; border: none; padding: 10px 20px; margin: 0 5px; cursor: pointer; font-size: 16px; border-radius: 4px; }
        .navbar button.active, .navbar button:hover { background-color: #007bff; }
        
        .container { max-width: 700px; margin: 20px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        /* Tab Control */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Form Styles */
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        select, input, button.action-btn { width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        button.action-btn { background-color: #007bff; color: white; border: none; cursor: pointer; margin-top: 10px; }
        button.action-btn:hover { background-color: #0056b3; }
        button.success-btn { background-color: #28a745; color: white; border: none; padding: 10px; width: 100%; font-size: 16px; cursor: pointer; margin-top: 15px; border-radius: 4px; }
        button.success-btn:hover { background-color: #218838; }
        
        /* Cart & Inventory Tables */
        .cart-section, .inventory-section { margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        .row-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; align-items: center; }
        .total { font-size: 18px; font-weight: bold; text-align: right; margin-top: 15px; }
        .stock-input { width: 80px; display: inline-block; margin-right: 10px; }
    </style>
</head>
<body>

<div class="navbar">
    <button id="btn-shop" class="active" onclick="switchTab('shop')">Checkout Terminal</button>
    <button id="btn-inventory" onclick="switchTab('inventory')">Inventory Management</button>
</div>

<div class="container">
    
    <div id="shop" class="tab-content active">
        <h2>Parts Selection System</h2>
        
        <div class="form-group">
            <label for="brand">Vehicle Brand</label>
            <select id="brand">
                <option value="Cadillac">Cadillac</option>
                <option value="Chevrolet">Chevrolet</option>
                <option value="GMC">GMC</option>
            </select>
        </div>

        <div class="form-group">
            <label for="year">Model Year</label>
            <select id="year">
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
                <option value="2021">2021</option>
                <option value="2020">2020</option>
            </select>
        </div>

        <div class="form-group">
            <label for="part">Required Part</label>
            <select id="part">
                </select>
        </div>

        <div class="form-group">
            <label for="condition">Part Condition</label>
            <select id="condition">
                <option value="New">OEM New</option>
                <option value="Used">OEM Used</option>
            </select>
        </div>

        <button class="action-btn" onclick="addToCart()">Add Part to Work Order</button>

        <div class="cart-section">
            <h3>Current Repair Order Cart</h3>
            <div id="cartItems"></div>
            <div class="total">Total: AED <span id="cartTotal">0</span></div>
            <button class="success-btn" onclick="checkoutOrder()">Process Checkout</button>
        </div>
    </div>

    <div id="inventory" class="tab-content">
        <h2>Inventory Management</h2>
        <p>Update stock levels below. Changes save locally.</p>
        
        <div class="inventory-section" id="inventoryList">
            </div>
    </div>

</div>

<script>
    // 1. Initial Stock Data (Saves to browser memory)
    const defaultInventory = {
        "Brake Pads": { price: 200, stock: 5 },
        "Oil Filter": { price: 45, stock: 10 }
    };

    let inventory = JSON.parse(localStorage.getItem('shopInventory')) || defaultInventory;
    let cart = [];
    let totalCost = 0;

    // 2. Tab Switching Logic
    function switchTab(tabId) {
        document.getElementById('shop').classList.remove('active');
        document.getElementById('inventory').classList.remove('active');
        document.getElementById('btn-shop').classList.remove('active');
        document.getElementById('btn-inventory').classList.remove('active');
        
        document.getElementById(tabId).classList.add('active');
        document.getElementById('btn-' + tabId).classList.add('active');

        updateShopDropdown();
        updateInventoryUI();
    }

    // 3. Update the Parts Dropdown (Hides out-of-stock items)
    function updateShopDropdown() {
        const partSelect = document.getElementById('part');
        partSelect.innerHTML = ''; 
        
        for (const [partName, data] of Object.entries(inventory)) {
            const option = document.createElement('option');
            option.value = partName;
            option.setAttribute('data-price', data.price);
            
            if (data.stock > 0) {
                option.innerText = `${partName} (AED ${data.price}) - In Stock: ${data.stock}`;
            } else {
                option.innerText = `${partName} (OUT OF STOCK)`;
                option.disabled = true;
            }
            partSelect.appendChild(option);
        }
    }

    // 4. Cart Logic
    function addToCart() {
        const partSelect = document.getElementById('part');
        if (partSelect.options.length === 0 || partSelect.options[partSelect.selectedIndex].disabled) {
            alert("This item is out of stock!");
            return;
        }

        const brand = document.getElementById('brand').value;
        const year = document.getElementById('year').value;
        const condition = document.getElementById('condition').value;
        const partName = partSelect.value;
        const price = parseInt(partSelect.options[partSelect.selectedIndex].getAttribute('data-price'));

        // Check if adding this exceeds current stock
        const countInCart = cart.filter(item => item.name === partName).length;
        if (countInCart >= inventory[partName].stock) {
            alert(`Cannot add more ${partName}. Maximum stock reached.`);
            return;
        }

        const description = `${year} ${brand} ${partName} (${condition})`;
        cart.push({ name: partName, description: description, price: price });
        totalCost += price;
        updateCartUI();
    }

    function updateCartUI() {
        const cartItemsContainer = document.getElementById('cartItems');
        cartItemsContainer.innerHTML = '';
        
        cart.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'row-item';
            div.innerHTML = `<span>${item.description}</span> 
                             <span>AED ${item.price} <button onclick="removeFromCart(${index})" style="margin-left:10px; color:red; cursor:pointer;">X</button></span>`;
            cartItemsContainer.appendChild(div);
        });

        document.getElementById('cartTotal').innerText = totalCost;
    }

    function removeFromCart(index) {
        totalCost -= cart[index].price;
        cart.splice(index, 1);
        updateCartUI();
    }

    function checkoutOrder() {
        if (cart.length === 0) {
            alert("Cart is empty!");
            return;
        }

        // Deduct stock
        cart.forEach(item => {
            inventory[item.name].stock -= 1;
        });

        // Save new stock to local storage
        localStorage.setItem('shopInventory', JSON.stringify(inventory));

        alert(`Checkout Successful! Total: AED ${totalCost}`);
        cart = [];
        totalCost = 0;
        updateCartUI();
        updateShopDropdown(); // Refresh dropdown to show new stock limits
    }

    // 5. Inventory Management Logic
    function updateInventoryUI() {
        const invContainer = document.getElementById('inventoryList');
        invContainer.innerHTML = '';

        for (const [partName, data] of Object.entries(inventory)) {
            const div = document.createElement('div');
            div.className = 'row-item';
            div.innerHTML = `
                <span><strong>${partName}</strong> (Price: AED ${data.price})</span>
                <div>
                    <span>Current Stock: <strong>${data.stock}</strong></span>
                    <input type="number" id="addStock-${partName}" class="stock-input" placeholder="Qty">
                    <button class="action-btn" style="width: auto; padding: 5px 10px; margin: 0;" onclick="addStock('${partName}')">Add Stock</button>
                </div>
            `;
            invContainer.appendChild(div);
        }
    }

    function addStock(partName) {
        const inputField = document.getElementById(`addStock-${partName}`);
        const qtyToAdd = parseInt(inputField.value);

        if (isNaN(qtyToAdd) || qtyToAdd <= 0) {
            alert("Please enter a valid number to add to stock.");
            return;
        }

        inventory[partName].stock += qtyToAdd;
        localStorage.setItem('shopInventory', JSON.stringify(inventory));
        
        inputField.value = ''; // clear input
        updateInventoryUI();
        updateShopDropdown();
        alert(`Successfully added ${qtyToAdd} to ${partName}.`);
    }

    // Initialize the app on page load
    window.onload = function() {
        updateShopDropdown();
    };
</script>

</body>
</html>
