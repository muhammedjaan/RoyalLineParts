<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OEM Parts Management System - Pro Edition</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --dark: #1e293b;
            --light: #f8fafc;
            --border: #e2e8f0;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            color: var(--dark);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        /* --- Login Screen --- */
        #loginScreen {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        #loginScreen input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
        }
        #loginError {
            color: var(--danger);
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }

        /* --- Main App Layout --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 20px;
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* Forms & Inputs */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
        }
        
        /* Buttons */
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: var(--primary-hover); }
        button.danger { background: var(--danger); }
        button.danger:hover { background: #dc2626; }

        /* Lists & Rows */
        .row-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 6px;
            margin-bottom: 10px;
            background: var(--light);
        }
        .stock-input {
            width: 80px;
            display: inline-block;
            margin-right: 5px;
        }
        
        /* Cart Specific */
        .cart-panel {
            background: var(--light);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="loginScreen">
        <h2>System Access</h2>
        <p style="color: #666; font-size: 14px; margin-bottom: 20px;">Secure Database Gateway</p>
        <input type="email" id="loginEmail" placeholder="Tenant Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button id="loginBtn" style="width: 100%; padding: 12px; font-size: 16px;">Authenticate</button>
        <div id="loginError"></div>
    </div>

    <div class="container" id="mainApp" style="display: none;">
        
        <div class="header">
            <h2>OEM Parts Management System</h2>
            <button id="logoutBtn" class="danger">Secure Logout</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" id="btn-tab-register" data-tab="tab-register">1. Registration</button>
            <button class="tab-btn" id="btn-tab-shop" data-tab="tab-shop">2. Storefront</button>
            <button class="tab-btn" id="btn-tab-manage" data-tab="tab-manage">3. Management</button>
        </div>

        <div id="tab-register" class="tab-content active">
            <h3>Add New Component to Registry</h3>
            <div class="form-grid">
                <input type="text" id="newBrand" placeholder="Brand">
                <input type="text" id="newModel" placeholder="Model">
                <input type="text" id="newYear" placeholder="Year">
                <select id="newCondition">
                    <option value="NEW">New (OEM)</option>
                    <option value="USED">Used (Inspected)</option>
                    <option value="REFURBISHED">Refurbished</option>
                </select>
                <input type="text" id="newPartName" placeholder="Component Name">
                <input type="text" id="newPartNumber" placeholder="Part Number">
                <input type="number" id="newCost" placeholder="Internal Cost (AED)">
                <input type="number" id="newPrice" placeholder="Selling Price (AED)">
                <input type="number" id="newStock" placeholder="Stock Quantity">
            </div>
            <button id="addNewPartBtn" style="width: 100%; font-size: 16px; padding: 15px;">Deploy Component to Cloud</button>
        </div>

        <div id="tab-shop" class="tab-content">
            <h3>Customer View & Checkout</h3>
            <div class="form-grid">
                <select id="brand"><option value="">-- Brand --</option></select>
                <select id="model"><option value="">-- Model --</option></select>
                <select id="year"><option value="">-- Year --</option></select>
                <select id="condition"><option value="">-- Condition --</option></select>
            </div>
            
            <div style="margin-top: 15px;">
                <label style="font-weight: bold; margin-bottom: 5px; display: block;">Available Parts:</label>
                <select id="part" style="margin-bottom: 15px; padding: 12px;"></select>
                <button id="addToCartBtn">Add to Order Sheet</button>
            </div>

            <div class="cart-panel">
                <h3 style="margin-top: 0;">Active Order Sheet</h3>
                <div id="cartItems"></div>
                <div style="margin-top: 20px; font-size: 18px; font-weight: bold; text-align: right;">
                    Total Invoice: AED <span id="cartTotal">0</span>
                </div>
                <button id="checkoutBtn" style="width: 100%; margin-top: 15px; padding: 15px; background: #10b981; font-size: 16px;">Process Transaction</button>
            </div>
        </div>

        <div id="tab-manage" class="tab-content">
            <h3>Live Inventory Matrix</h3>
            <input type="text" id="inventorySearch" placeholder="Search by brand, model, or part name..." style="margin-bottom: 20px; padding: 12px;">
            <div id="inventoryList"></div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
