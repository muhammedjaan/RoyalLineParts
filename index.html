<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shop Terminal</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        select, input, button { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; }
        .row-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 2px solid #ddd; }
    </style>
</head>
<body>
<div class="container">
    <div id="shop" class="tab-content active">
        <h2>Parts Checkout</h2>
        <select id="brand" onchange="handleBrandChange()"></select>
        <select id="model" onchange="updateShopDropdown()"></select>
        <select id="year" onchange="updateShopDropdown()"></select>
        <select id="part"></select>
        <button onclick="addToCart()">Add to Order</button>
        <button onclick="checkoutOrder()" style="background:#28a745; color:white; margin-top:10px;">Process Checkout</button>
    </div>
    <div id="inventory" class="tab-content">
        <h2>Inventory Management</h2>
        <div id="inventoryList"></div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
