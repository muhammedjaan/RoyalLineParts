<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Terminal</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .navbar { margin-bottom: 20px; display: flex; gap: 10px; }
        .navbar button { padding: 10px 20px; cursor: pointer; border: 1px solid #ccc; background: #eee; flex: 1; }
        .navbar button.active { background: #007bff; color: white; border: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 15px; }
        select, input, button { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; }
        
        .row-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 2px solid #ddd; flex-wrap: wrap; }
        .controls-group { display: flex; gap: 15px; align-items: center; }
        .control-box { display: flex; flex-direction: column; align-items: center; gap: 5px; width: 90px; }
        .control-box input { width: 100% !important; padding: 8px; }
        #inventoryList { max-height: 500px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="navbar">
        <button id="btn-shop" class="active" onclick="switchTab('shop')">Checkout</button>
        <button id="btn-inventory" onclick="switchTab('inventory')">Inventory</button>
    </div>

    <div id="shop" class="tab-content active">
        <h2>Parts Checkout</h2>
        <div class="form-group">
            <label>Brand</label> <select id="brand" onchange="handleBrandChange()"></select>
            <label>Model</label> <select id="model" onchange="updateShopDropdown()"></select>
            <label>Year</label> <select id="year" onchange="updateShopDropdown()"></select>
            <label>Part</label> <select id="part"></select>
            <button onclick="addToCart()">Add to Order</button>
        </div>
        <div id="cartItems"></div>
        <div style="text-align:right; font-weight:bold; margin-top:10px;">Total: AED <span id="cartTotal">0</span></div>
        <button onclick="checkoutOrder()" style="background:#28a745; color:white;">Process Checkout</button>
    </div>

    <div id="inventory" class="tab-content">
        <h2>Inventory Management</h2>
        <input type="text" id="searchInventory" placeholder="Search parts..." onkeyup="updateInventoryUI()">
        <div id="inventoryList"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
