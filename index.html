<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OEM Parts Management System</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --dark: #343a40; --light: #f8f9fa; --border: #dee2e6; }
        body { font-family: sans-serif; margin: 0; padding: 20px; background-color: #f4f6f9; }
        .container { max-width: 1100px; margin: 0 auto; }
        .card { background: white; padding: 24px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; }
        .btn { background-color: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        #loginScreen { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
        .tab-content { display: none; } .tab-content.active { display: block; }
    </style>
</head>
<body>

<div id="loginScreen">
    <h2>System Access</h2>
    <input type="email" id="loginEmail" placeholder="Email" style="width: 100%; padding: 10px; margin-bottom: 10px; box-sizing: border-box;">
    <input type="password" id="loginPassword" placeholder="Password" style="width: 100%; padding: 10px; margin-bottom: 20px; box-sizing: border-box;">
    <button id="loginBtn" class="btn">Login</button>
    <p id="loginError" style="color: red; font-size: 13px; display: none;"></p>
</div>

<div class="container" id="mainApp" style="display: none;">
    <header style="display: flex; justify-content: space-between; border-bottom: 2px solid #ddd; padding-bottom: 15px; margin-bottom: 20px;">
        <h1>Parts Desk</h1>
        <button id="logoutBtn" style="background: var(--danger); color: white; border: none; padding: 10px; cursor: pointer;">Logout</button>
    </header>
    
    <div id="shop" class="tab-content active">
        <div class="card">
            <h2>Inventory</h2>
            <div id="inventoryList"></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script src="script.js"></script>
</body>
</html>
